services:
  - type: web
    name: stayos-hotel
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node --experimental-sqlite src/server.js
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: STAYOS_SECRET
        generateValue: true
      - key: DB_FILE
        value: /tmp/stayos.sqlite
